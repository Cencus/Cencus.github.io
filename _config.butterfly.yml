# Butterfly 主题配置

# 首页 Banner（已禁用）
index_img:

# 默认文章封面（随机选择）
default_cover:
  - /img/banner.jpg

# 打字机效果副标题
subtitle:
  enable: true
  effect: true  # 打字机效果
  loop: true    # 循环播放
  source: false # 关闭第三方
  sub:
    - "Stay hungry, stay foolish. — Steve Jobs"
    - "Talk is cheap. Show me the code. — Linus Torvalds"
    - "The best way to predict the future is to create it. — Alan Kay"

# 页脚背景
footer_bg: /img/banner.jpg

# 不蒜子统计（访问量显示）
busuanzi:
  site_uv: true  # 站点访客数
  site_pv: true  # 站点访问量
  page_pv: true  # 文章阅读量

# PJAX（无刷新页面切换，Live2D 持久化）
pjax:
  enable: true

# Live2D 看板娘（蕾姆）
inject:
  head:
    - <link rel="stylesheet" href="/live2d/css/live2d.css" />
  bottom:
    - <div id="landlord" style="right:5px;bottom:0px;"><div class="message" style="opacity:0"></div><canvas id="live2d" width="500" height="560" class="live2d"></canvas><input type="hidden" id="live_talk" value="1"></div>
    - <script src="/live2d/js/jquery.min.js"></script>
    - <script>var message_Path = '/live2d/'; var talkAPI = '';</script>
    - <script src="/live2d/js/live2d.js"></script>
    - <script src="/live2d/js/message.js"></script>